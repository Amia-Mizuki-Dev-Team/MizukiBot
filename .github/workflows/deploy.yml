name: Deploy to Cloudflare Pages

# 触发条件
on:
  push:
    branches:
      - main  # 监听主分支的自动推送（如果是 master 请自行修改）
  
  # 关键点：支持在 GitHub 仓库的 Actions 页面手动点击按钮触发
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 保留完整历史，用于 VitePress 计算页面的最后更新时间

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run docs:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: mizuki-bot-docs # 改成你在 Cloudflare Pages 创建的项目名称
          directory: docs/.vitepress/dist # VitePress 的输出目录
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
