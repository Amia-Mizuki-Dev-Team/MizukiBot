name: Sync Sponsors

on:
  schedule:
    - cron: '0 2 * * *' # 每天 UTC 02:00（北京时间 10:00）
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-sponsors
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate API token
        env:
          AFDIAN_TOKEN: ${{ secrets.AFDIAN_TOKEN }}
        run: |
          if [ -z "$AFDIAN_TOKEN" ]; then
            echo "::error::缺少仓库 Secret：AFDIAN_TOKEN"
            exit 1
          fi

      - name: Sync sponsors from Afdian
        run: node scripts/sync-sponsors.mjs
        env:
          AFDIAN_USER_ID: c34c76c0537211f188d952540025c377
          AFDIAN_TOKEN: ${{ secrets.AFDIAN_TOKEN }}

      - name: Commit synchronized sponsor list
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/sponsor_list.md

          if git diff --cached --quiet; then
            echo "赞助榜没有变化，无需提交"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: auto sync sponsors"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger documentation deployment
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref "${GITHUB_REF_NAME}"
